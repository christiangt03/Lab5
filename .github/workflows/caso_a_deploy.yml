name: "Caso A: Deploy Seguro"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Simulate Tests
        run: |
          echo "Ejecutando pruebas unitarias..."
          echo "Tests completados exitosamente."

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    # CONDICIONAL SEGURO: Evita el despliegue accidental desde ramas que no sean main o eventos PR
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Perform Deploy
        run: |
          echo "Realizando despliegue seguro en producción..."
          echo "Despliegue finalizado con éxito."
